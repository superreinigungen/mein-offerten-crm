<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CLEVO Pro - Professionelles CRM & Offerten-Management">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CLEVO Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>CLEVO Pro</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; padding: 0; background-color: #1a237e; font-family: 'Segoe UI', Arial, sans-serif; }
    #loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a237e, #0d47a1); color: white; z-index: 9999; }
    #loading h1 { font-size: 32px; margin-bottom: 20px; }
    #loading .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loading p { margin-top: 20px; opacity: 0.8; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>CLEVO Pro</h1>
    <div class="spinner"></div>
    <p>App wird geladen...</p>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
